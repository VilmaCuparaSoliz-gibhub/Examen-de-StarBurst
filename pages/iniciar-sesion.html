<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="../assets/css/estilo7.css">

</head>

<body>

    <div class="contenedor">

        <header class="titulo-superior">
            INGRESE SU IDENTIFICACION
        </header>

        <section class="banner">

            <img src="../assets/img/bdr.png" alt="Banner">

            <div class="banner-texto">

                <h1>V S.I.A.F</h1>

                <p class="subtitulo">
                    Sistema de Activos Fijos
                </p>

            </div>

        </section>

        <section class="login">

            <h2>Login</h2>

            <div class="fila">

                <label for="usuario">
                    Usuario:
                </label>

                <input
                    type="text"
                    id="usuario"
                >

            </div>

            <div class="fila">

                <label for="password">
                    Contraseña:
                </label>

                <input
                    type="password"
                    id="password"
                >

            </div>

            <div class="parte-inferior">

                <span>
                    NOTA: Es sensible al contexto
                </span>

                <button id="btnLogin">
                    Aceptar
                </button>

            </div>

        </section>

        <footer class="footer">

            <p>VSIAF versión 2.0</p>

            <p>
                Copyright © 1999-2012 DGSGIF
            </p>

            <p>
                Todos los derechos reservados
            </p>

        </footer>

    </div>

    <script src="../javasr/iniciar-sesion.js"></script>

</body>

</html>
